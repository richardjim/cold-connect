server.port=8080
spring.application.name=cold-connect

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/coldconnectdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

jwt.secret=${JWT_SECRET:cold-connect-secret-key-minimum-32-chars!!}
jwt.access-token-expiry=900000
jwt.refresh-token-expiry=604800000

app.password-reset-expiry-minutes=60

mailjet.api-key=${MAILJET_API_KEY}
mailjet.secret-key=${MAILJET_SECRET_KEY}

app.mail.from-name=Cold Connect
app.mail.from-address=${MAILJET_FROM_ADDRESS:noreply@coldconnect.app}
app.base-url=${APP_BASE_URL:http://localhost:8080}

springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

rate-limit.auth.requests-per-minute=10
rate-limit.api.requests-per-minute=60